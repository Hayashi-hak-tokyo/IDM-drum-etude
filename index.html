<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDM Drum Etude Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 楽譜レンダリング用ライブラリ ABCJS -->
    <script src="https://cdn.jsdelivr.net/npm/abcjs@6.3.0/dist/abcjs-basic-min.js"></script>
    <!-- PDF生成用ライブラリ html2pdf.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { background-color: #050505; color: #00ff00; }
        #paper { background-color: #fdfdfd; border-radius: 8px; padding: 20px; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5); color: #000; }
        .abcjs-container { fill: #000; stroke: #000; }
        .grid-cell { background-color: #111; border: 1px solid #222; border-radius: 1px; height: 28px; transition: all 0.05s; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .grid-cell:nth-child(6n+1) { border-left: 1px solid #444; }
        .grid-cell:nth-child(24n+1) { border-left: 2px solid #666; }
        .grid-cell:nth-child(96n+1) { border-left: 2px solid #888; box-shadow: -2px 0 5px rgba(255,255,255,0.1); }
        .grid-cell.active-HH { background-color: #facc15; box-shadow: 0 0 8px #facc15; }
        
        /* スネアのコントラスト強化 */
        .grid-cell.active-SD-ghost { 
            background-color: #0ea5e9; 
            opacity: 0.35; 
            transform: scale(0.65); 
            border: none;
        }
        .grid-cell.active-SD-accent { 
            background-color: #38bdf8; 
            box-shadow: 0 0 15px #38bdf8, inset 0 0 5px white; 
            border: 1px solid white;
        }
        
        .grid-cell.active-FT { background-color: #a855f7; box-shadow: 0 0 8px #a855f7; }
        .grid-cell.active-BD { background-color: #ef4444; box-shadow: 0 0 8px #ef4444; }
        .playing-col { background-color: rgba(255, 255, 255, 0.2); transform: scale(1.05); border-bottom: 2px solid #00ff00; }
        .mode-active { background-color: #1e293b !important; border-color: #00ff00 !important; color: #00ff00 !important; box-shadow: 0 0 10px rgba(0, 255, 0, 0.3); }
        .btn-toggle-active { background-color: #166534 !important; color: #4ade80 !important; border-color: #22c55e !important; }
    </style>
</head>
<body class="font-mono h-screen flex flex-col items-center p-4">

    <div class="w-full max-w-6xl flex flex-col items-center">
        <h1 class="text-3xl md:text-4xl font-bold mb-6 tracking-widest text-center mt-4 uppercase text-white">Drum Etude</h1>
        
        <div class="flex flex-wrap justify-center items-center gap-4 mb-6 bg-gray-900 p-4 rounded-lg border border-gray-800 shadow-xl">
            <div class="flex gap-2">
                <button id="btn-mode-basic" class="px-3 py-2 bg-gray-800 hover:bg-gray-700 text-gray-400 rounded font-bold border border-gray-600 transition uppercase text-xs mode-active">Basic View</button>
                <button id="btn-mode-glitch" class="px-3 py-2 bg-gray-800 hover:bg-gray-700 text-gray-400 rounded font-bold border border-gray-600 transition uppercase text-xs">Glitch View</button>
            </div>

            <button id="btn-generate" class="px-4 py-2 bg-blue-700 hover:bg-blue-600 text-white rounded font-black border border-blue-400 transition uppercase text-sm shadow-lg">Generate 🎲</button>

            <button id="btn-pdf" class="px-4 py-2 bg-gray-700 hover:bg-gray-600 text-gray-200 rounded font-bold border border-gray-500 transition uppercase text-sm">Export PDF 📄</button>

            <div class="w-px bg-gray-700 h-8 mx-1"></div>
            
            <button id="btn-play" class="px-6 py-2 bg-green-900 hover:bg-green-800 text-green-400 rounded font-bold border border-green-700 transition">PLAY ▶</button>
            <button id="btn-stop" class="px-4 py-2 bg-gray-800 hover:bg-gray-700 text-gray-400 rounded font-bold border border-gray-600 transition text-sm uppercase">Stop</button>
            
            <button id="btn-loop" class="px-4 py-2 bg-gray-800 hover:bg-gray-700 text-gray-400 rounded font-bold border border-gray-600 transition text-sm uppercase btn-toggle-active">Loop: ON</button>

            <div class="flex items-center ml-2">
                <label for="bpm-slider" class="mr-2 text-xs text-gray-400 font-bold">BPM:</label>
                <input type="range" id="bpm-slider" min="60" max="240" value="120" class="w-20 cursor-pointer">
                <span id="bpm-display" class="ml-2 w-8 text-right text-sm font-bold text-green-400">120</span>
            </div>
        </div>

        <div class="w-full bg-white rounded-lg shadow-2xl mb-6 border-4 border-gray-300 overflow-hidden relative min-h-[160px]">
            <div id="paper" class="w-full overflow-x-auto"></div>
        </div>

        <div class="w-full overflow-x-auto bg-[#0a0a0a] p-4 rounded-lg border border-gray-800 shadow-xl mb-12">
            <h2 class="text-[10px] text-gray-500 mb-2 font-bold tracking-widest text-center uppercase">Sequence Editor (Snare: Click to toggle Dynamics)</h2>
            <div class="flex">
                <div class="flex flex-col justify-between pr-4 font-bold text-[10px] text-gray-400 w-8 flex-shrink-0" id="labels">
                    <div class="h-7 flex items-center justify-center text-[10px]">HH</div>
                    <div class="h-7 flex items-center justify-center text-[10px]">SD</div>
                    <div class="h-7 flex items-center justify-center text-[10px]">FT</div>
                    <div class="h-7 flex items-center justify-center text-[10px]">BD</div>
                </div>
                <div class="grid grid-rows-4 gap-y-1 flex-grow" id="sequencer-grid"></div>
            </div>
            <div class="flex mt-1 ml-8 pl-1"><div class="grid w-full" id="scale-grid"></div></div>
        </div>
    </div>

    <script>
        let audioCtx; let noiseBuffer;
        const SD_OFF = 0, SD_GHOST = 1, SD_ACCENT = 2;
        let currentMode = 'basic'; 
        let basicPatternData = null; let glitchPatternData = null;
        const BARS = 4, STEPS_PER_BAR = 96, STEPS = BARS * STEPS_PER_BAR; 
        let currentPattern = { HH: new Array(STEPS).fill(0), SD: new Array(STEPS).fill(0), FT: new Array(STEPS).fill(0), BD: new Array(STEPS).fill(0) };
        const instruments = ['HH', 'SD', 'FT', 'BD'];

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const bufferSize = audioCtx.sampleRate * 2.0;
                noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                const output = noiseBuffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) output[i] = Math.random() * 2 - 1;
            }
        }

        // --- Audio Timbres ---
        function playBD(time, vol = 1.0) {
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(150, time);
            osc.frequency.exponentialRampToValueAtTime(45, time + 0.1);
            gain.gain.setValueAtTime(vol, time);
            gain.gain.exponentialRampToValueAtTime(0.001, time + 0.4);
            osc.start(time); osc.stop(time + 0.4);
            const click = audioCtx.createOscillator(); const clickGain = audioCtx.createGain();
            click.frequency.setValueAtTime(2000, time);
            click.frequency.exponentialRampToValueAtTime(100, time + 0.02);
            click.connect(clickGain); clickGain.connect(audioCtx.destination);
            clickGain.gain.setValueAtTime(0.3 * vol, time);
            clickGain.gain.exponentialRampToValueAtTime(0.01, time + 0.02);
            click.start(time); click.stop(time + 0.02);
        }

        function playFT(time, vol = 1.0) {
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(110, time);
            osc.frequency.exponentialRampToValueAtTime(65, time + 0.2);
            gain.gain.setValueAtTime(0.8 * vol, time);
            gain.gain.exponentialRampToValueAtTime(0.001, time + 0.6);
            osc.start(time); osc.stop(time + 0.6);
        }

        function playSD(time, level, vol = 1.0) {
            if (level === SD_OFF) return;
            const isGhost = (level === SD_GHOST);
            
            const osc = audioCtx.createOscillator(); 
            const oscGain = audioCtx.createGain();
            osc.type = 'triangle'; 
            osc.connect(oscGain); 
            oscGain.connect(audioCtx.destination);

            if (isGhost) {
                osc.frequency.setValueAtTime(450, time);
                oscGain.gain.setValueAtTime(0.12 * vol, time);
                oscGain.gain.exponentialRampToValueAtTime(0.001, time + 0.025);
            } else {
                osc.frequency.setValueAtTime(250, time);
                osc.frequency.exponentialRampToValueAtTime(160, time + 0.08);
                oscGain.gain.setValueAtTime(0.8 * vol, time);
                oscGain.gain.exponentialRampToValueAtTime(0.001, time + 0.15);
            }
            osc.start(time); osc.stop(time + 0.2);

            const noise = audioCtx.createBufferSource(); 
            noise.buffer = noiseBuffer;
            const noiseFilter = audioCtx.createBiquadFilter(); 
            const noiseGain = audioCtx.createGain();
            noise.connect(noiseFilter); 
            noiseFilter.connect(noiseGain); 
            noiseGain.connect(audioCtx.destination);
            
            if (isGhost) {
                noiseFilter.type = 'bandpass';
                noiseFilter.frequency.setValueAtTime(6000, time);
                noiseFilter.Q.value = 1.5;
                noiseGain.gain.setValueAtTime(0.6 * vol, time); 
                noiseGain.gain.exponentialRampToValueAtTime(0.001, time + 0.05);
            } else {
                noiseFilter.type = 'highpass';
                noiseFilter.frequency.setValueAtTime(1000, time);
                noiseGain.gain.setValueAtTime(0.75 * vol, time);
                noiseGain.gain.exponentialRampToValueAtTime(0.001, time + 0.22);
            }
            noise.start(time); noise.stop(time + 0.3);
        }

        function playHH(time, vol = 1.0) {
            const noise = audioCtx.createBufferSource(); noise.buffer = noiseBuffer;
            const bandpass = audioCtx.createBiquadFilter(); bandpass.type = 'bandpass'; bandpass.frequency.value = 10000;
            const gain = audioCtx.createGain(); noise.connect(bandpass); bandpass.connect(gain); gain.connect(audioCtx.destination);
            gain.gain.setValueAtTime(0.35 * vol, time);
            gain.gain.exponentialRampToValueAtTime(0.01, time + 0.05);
            noise.start(time); noise.stop(time + 0.1);
        }

        // --- Generation Logic ---
        function clonePattern(p) { return { HH: [...p.HH], SD: [...p.SD], FT: [...p.FT], BD: [...p.BD] }; }

        function generateData() {
            let basic = { HH: new Array(STEPS).fill(0), SD: new Array(STEPS).fill(0), FT: new Array(STEPS).fill(0), BD: new Array(STEPS).fill(0) };
            const hhInterval = Math.random() > 0.5 ? 6 : 12; 
            for(let i = 0; i < STEPS; i += hhInterval) basic.HH[i] = 1;
            for(let bar = 0; bar < BARS; bar++) {
                let offset = bar * STEPS_PER_BAR;
                basic.SD[offset + 24] = SD_ACCENT; basic.SD[offset + 72] = SD_ACCENT; 
                basic.BD[offset + 0] = 1; if(Math.random() > 0.4) basic.BD[offset + 18] = 1;
                if(Math.random() > 0.4) basic.BD[offset + 54] = 1;
                for(let i = 0; i < STEPS_PER_BAR; i += 6) {
                    let step = offset + i;
                    if (basic.SD[step] === SD_OFF && basic.BD[step] === 0) {
                        let distToBackbeat = Math.min(Math.abs(i-24), Math.abs(i-72));
                        if (distToBackbeat <= 12 && Math.random() < 0.75) basic.SD[step] = SD_GHOST;
                    }
                }
            }
            for(let i = 0; i < STEPS - 24; i += 6) { if(basic.BD[i] && Math.random() > 0.6) { basic.BD[i+6] = 1; if(Math.random() > 0.6) basic.BD[i+12] = 1; } }
            
            basic = applyFTRuleToPattern(basic);
            basic = applyAccentRule(basic);
            basicPatternData = basic;

            let glitch = clonePattern(basicPatternData);
            for(let bar = 0; bar < BARS; bar++) {
                let barStart = bar * STEPS_PER_BAR;
                for(let beat = 0; beat < 4; beat++) {
                    let beatStart = barStart + beat * 24;
                    let r = Math.random();
                    if(r > 0.6) {
                        glitch.SD.fill(SD_OFF, beatStart, beatStart + 24);
                        glitch.BD.fill(0, beatStart, beatStart + 24);
                        glitch.FT.fill(0, beatStart, beatStart + 24);
                        let type = Math.random();
                        if (type > 0.7) { // 32nd notes
                            let target = Math.random() > 0.5 ? 'SD' : 'BD';
                            for(let i=0; i<24; i+=3) {
                                if (target === 'SD') glitch.SD[beatStart + i] = (i % 6 === 0) ? SD_ACCENT : SD_GHOST;
                                else glitch.BD[beatStart + i] = 1;
                            }
                        } else if (type > 0.4) { // 6-lets
                            let target = Math.random() > 0.5 ? 'SD' : 'BD';
                            for(let i=0; i<24; i+=4) {
                                if (target === 'SD') glitch.SD[beatStart + i] = (i % 8 === 0) ? SD_ACCENT : SD_GHOST;
                                else glitch.BD[beatStart + i] = 1;
                            }
                        } else { // 3-lets
                            for(let i=0; i<24; i+=8) {
                                if (Math.random() > 0.5) glitch.BD[beatStart + i] = 1;
                                else glitch.SD[beatStart + i] = SD_ACCENT;
                            }
                        }
                    }
                }
            }
            
            glitch = applyFTRuleToPattern(glitch);
            glitch = applyAccentRule(glitch);
            glitch = applyHHConstraint(glitch); // 新規：ハイハット制限
            glitchPatternData = glitch;
            
            updateCurrentPatternFromStorage();
        }

        function updateCurrentPatternFromStorage() {
            currentPattern = clonePattern(currentMode === 'basic' ? basicPatternData : glitchPatternData);
            renderGrid(); renderScore();
        }

        /** 1拍の中に高密度なフィルがある場合、拍頭以外のハイハットを削除する */
        function applyHHConstraint(p) {
            for (let bar = 0; bar < BARS; bar++) {
                for (let beat = 0; beat < 4; beat++) {
                    let start = (bar * STEPS_PER_BAR) + (beat * 24);
                    let isComplex = false;
                    for (let i = 0; i < 24; i++) {
                        let step = start + i;
                        // 16分音符のグリッド（間隔6）に乗らない音がSD, BD, FTにあるかチェック
                        if ((p.SD[step] !== SD_OFF || p.BD[step] || p.FT[step]) && (i % 6 !== 0)) {
                            isComplex = true;
                            break;
                        }
                    }

                    if (isComplex) {
                        // この拍のハイハットを拍頭以外クリアする
                        for (let i = 1; i < 24; i++) {
                            p.HH[start + i] = 0;
                        }
                    }
                }
            }
            return p;
        }

        function applyAccentRule(p) {
            for (let bar = 0; bar < BARS; bar++) {
                for (let beat = 0; beat < 4; beat++) {
                    let start = (bar * STEPS_PER_BAR) + (beat * 24);
                    let accents = [];
                    for (let i = 0; i < 24; i++) {
                        if (p.SD[start + i] === SD_ACCENT) accents.push(start + i);
                    }
                    if (accents.length > 2) {
                        accents.sort((a, b) => {
                            let priA = (a % 12 === 0) ? 0 : ((a % 6 === 0) ? 1 : 2);
                            let priB = (b % 12 === 0) ? 0 : ((b % 6 === 0) ? 1 : 2);
                            return priA - priB;
                        });
                        for (let j = 2; j < accents.length; j++) {
                            p.SD[accents[j]] = SD_GHOST;
                        }
                    }
                }
            }
            return p;
        }

        function applyFTRuleToPattern(p) {
            for(let i = 0; i < STEPS; i++) { if(p.FT[i]) { p.BD[i] = 1; p.FT[i] = 0; } }
            let bdIndices = []; for(let i = 0; i < STEPS; i++) if(p.BD[i]) bdIndices.push(i);
            let groups = []; let currentGroup = [];
            for(let i = 0; i < bdIndices.length; i++) {
                if(currentGroup.length === 0) currentGroup.push(bdIndices[i]);
                else {
                    if(bdIndices[i] - currentGroup[currentGroup.length - 1] <= 8) currentGroup.push(bdIndices[i]);
                    else { groups.push(currentGroup); currentGroup = [bdIndices[i]]; }
                }
            }
            if(currentGroup.length > 0) groups.push(currentGroup);
            
            groups.forEach(group => {
                if(group.length >= 3) {
                    let assignment = [];
                    let consecutiveBD = 0;
                    let lastInstrument = null;

                    for(let k = 0; k < group.length; k++) {
                        let step = group[k];
                        let canBeFT = true;
                        let canBeBD = true;

                        if (step % STEPS_PER_BAR === 0) canBeFT = false;
                        if (lastInstrument === 'FT') canBeFT = false;
                        if (consecutiveBD >= 2) canBeBD = false;

                        let pick = 'BD';
                        if (!canBeBD) pick = 'FT';
                        else if (!canBeFT) pick = 'BD';
                        else pick = Math.random() > 0.5 ? 'FT' : 'BD';

                        assignment.push(pick);
                        lastInstrument = pick;
                        if (pick === 'BD') consecutiveBD++; else consecutiveBD = 0;
                    }

                    if (!assignment.includes('FT')) {
                        for(let k = 0; k < assignment.length; k++) {
                            if (group[k] % STEPS_PER_BAR !== 0) {
                                let prevIsFT = (k > 0 && assignment[k-1] === 'FT');
                                let nextIsFT = (k < assignment.length - 1 && assignment[k+1] === 'FT');
                                if (!prevIsFT && !nextIsFT) {
                                    assignment[k] = 'FT';
                                    break; 
                                }
                            }
                        }
                    }
                    for(let k = 0; k < group.length; k++) { p.BD[group[k]] = 0; p[assignment[k]][group[k]] = 1; }
                }
            });
            return p;
        }

        function formatNote(note, len32) {
            if (note === "z") {
                let res = ""; let rem = len32;
                while (rem >= 8) { res += "z4"; rem -= 8; }
                while (rem >= 4) { res += "z2"; rem -= 4; }
                while (rem >= 2) { res += "z"; rem -= 2; }
                while (rem >= 1) { res += "z/2"; rem -= 1; }
                return res;
            } else {
                if (len32 === 1) return note + "/2"; if (len32 === 2) return note; 
                if (len32 === 3) return note + "3/2"; if (len32 === 4) return note + "2"; 
                return note + (len32/2);
            }
        }

        function getBeatAbc(beatEvents) {
            let has32nd = false, has6let = false, has3let = false;
            for(let i=0; i<24; i++) {
                if(beatEvents[i].length > 0) {
                    if (i % 6 !== 0) { if (i % 8 === 0) has3let = true; else if (i % 4 === 0) has6let = true; else if (i % 3 === 0) has32nd = true; }
                }
            }
            if (has6let) {
                let str = "(6"; for(let i=0; i<6; i++) { let ev = beatEvents[i*4]; str += ev.length === 0 ? "z" : (ev.length === 1 ? ev[0] : `[${ev.join("")}]`); }
                return str;
            } else if (has3let && !has32nd) {
                let str = "(3"; for(let i=0; i<3; i++) { let ev = beatEvents[i*8]; str += (ev.length === 0 ? "z" : (ev.length === 1 ? ev[0] : `[${ev.join("")}]`)) + "2"; }
                return str;
            } else {
                let str = ""; let currentLen = 0; let currentNote = "";
                let unit = has32nd ? 3 : 6; let count = has32nd ? 8 : 4;
                for(let i=0; i<count; i++) {
                    let ev = beatEvents[i*unit]; let noteStr = ev.length === 0 ? "z" : (ev.length === 1 ? ev[0] : `[${ev.join("")}]`);
                    if (currentNote === "") { currentNote = noteStr; currentLen = 1; }
                    else if (noteStr === "z") { currentLen++; }
                    else { str += has32nd ? formatNote(currentNote, currentLen) : (currentNote + (currentLen > 1 ? currentLen : "")); currentNote = noteStr; currentLen = 1; }
                }
                if (currentNote !== "") str += has32nd ? formatNote(currentNote, currentLen) : (currentNote + (currentLen > 1 ? currentLen : ""));
                return str;
            }
        }

        function renderScore() {
            let modeTitle = currentMode.charAt(0).toUpperCase() + currentMode.slice(1);
            let abcString = `X:1\nT:Drum Etude - ${modeTitle} Mode\nM:4/4\nL:1/16\nK:perc\n`;
            abcString += `V:1 clef=perc\n`; abcString += `[| `; 
            let abcVoice = "";
            for(let bar = 0; bar < BARS; bar++) {
                for(let beat = 0; beat < 4; beat++) {
                    let beatEvents = []; let offset = bar * STEPS_PER_BAR + beat * 24;
                    for(let i=0; i<24; i++) {
                        let step = offset + i; let notes = [];
                        if (currentPattern.HH[step]) notes.push('!style=x!g'); 
                        if (currentPattern.SD[step] !== SD_OFF) {
                            let note = "c"; if (currentPattern.SD[step] === SD_ACCENT) note = "!>!" + note;
                            notes.push(note);
                        }
                        if (currentPattern.FT[step]) notes.push('A'); if (currentPattern.BD[step]) notes.push('F');
                        beatEvents.push(notes);
                    }
                    abcVoice += getBeatAbc(beatEvents) + " ";
                }
                abcVoice += "| "; 
            }
            abcVoice += "]";
            ABCJS.renderAbc("paper", abcString + abcVoice, { responsive: "resize", add_classes: true, staffwidth: 800 });
        }

        function exportPDF() {
            const element = document.getElementById('paper');
            const modeName = currentMode.toUpperCase();
            const timestamp = new Date().toISOString().slice(0,10);
            const opt = {
                margin: 15,
                filename: `DrumEtude_${modeName}_${timestamp}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, useCORS: true },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'landscape' }
            };
            html2pdf().set(opt).from(element).save();
        }

        const gridContainer = document.getElementById('sequencer-grid');
        const scaleGrid = document.getElementById('scale-grid');
        let domCells = { HH: [], SD: [], FT: [], BD: [] };

        function initGrid() {
            gridContainer.innerHTML = ''; gridContainer.style.gridTemplateColumns = `repeat(${STEPS}, minmax(3px, 1fr))`;
            scaleGrid.innerHTML = ''; scaleGrid.style.gridTemplateColumns = `repeat(${STEPS}, 1fr)`;
            for(let bar = 0; bar < BARS; bar++) {
                for(let beat = 1; beat <= 4; beat++) {
                    for(let step=0; step<24; step++) {
                        let text = (step===0) ? beat : (step===6 ? "e" : (step===12 ? "+" : (step===18 ? "a" : "")));
                        scaleGrid.innerHTML += `<div class="text-[8px] text-gray-500 flex justify-center">${text}</div>`;
                    }
                }
            }
            instruments.forEach(inst => {
                domCells[inst] = [];
                for(let i = 0; i < STEPS; i++) {
                    const cell = document.createElement('div'); cell.className = `grid-cell`;
                    cell.addEventListener('click', () => {
                        if (inst === 'SD') {
                            currentPattern.SD[i] = (currentPattern.SD[i] + 1) % 3;
                            applyAccentRule(currentPattern);
                        }
                        else currentPattern[inst][i] = currentPattern[inst][i] ? 0 : 1;
                        renderGrid(); renderScore(); 
                    });
                    gridContainer.appendChild(cell); domCells[inst].push(cell);
                }
            });
        }

        function renderGrid() {
            instruments.forEach(inst => {
                for(let i = 0; i < STEPS; i++) {
                    const cell = domCells[inst][i];
                    cell.classList.remove(`active-HH`, `active-SD-ghost`, `active-SD-accent`, `active-FT`, `active-BD`);
                    if (inst === 'SD') {
                        if (currentPattern.SD[i] === SD_GHOST) cell.classList.add('active-SD-ghost');
                        else if (currentPattern.SD[i] === SD_ACCENT) cell.classList.add('active-SD-accent');
                    } else if (currentPattern[inst][i]) cell.classList.add(`active-${inst}`);
                }
            });
        }

        let isPlaying = false, isLooping = true, currentStep = 0, nextNoteTime = 0, timerID, bpm = 120;
        let drawQueue = []; 

        function nextNote() {
            nextNoteTime += (60.0 / bpm) / 24;
            currentStep++; if (currentStep >= STEPS) { if (isLooping) currentStep = 0; else stopPlayback(); }
        }

        function scheduleNote(stepNumber, time) {
            drawQueue.push({ step: stepNumber, time: time });
            let vol = currentMode === 'glitch' ? (Math.random() * 0.3 + 0.7) : 1.0;
            if (currentPattern.HH[stepNumber]) playHH(time, vol);
            if (currentPattern.SD[stepNumber] !== SD_OFF) playSD(time, currentPattern.SD[stepNumber], vol);
            if (currentPattern.FT[stepNumber]) playFT(time, vol);
            if (currentPattern.BD[stepNumber]) playBD(time, vol);
        }

        function scheduler() {
            if (!isPlaying) return;
            while (nextNoteTime < audioCtx.currentTime + 0.1) { scheduleNote(currentStep, nextNoteTime); nextNote(); if (!isPlaying) break; }
            if (isPlaying) timerID = requestAnimationFrame(scheduler);
        }

        function drawLoop() {
            if(isPlaying) {
                let currentTime = audioCtx.currentTime; let currentDrawStep = -1;
                while (drawQueue.length && drawQueue[0].time < currentTime) { currentDrawStep = drawQueue[0].step; drawQueue.splice(0, 1); }
                if (currentDrawStep !== -1) {
                    for(let i=0; i<STEPS; i++) instruments.forEach(inst => domCells[inst][i].classList.remove('playing-col'));
                    instruments.forEach(inst => domCells[inst][currentDrawStep].classList.add('playing-col'));
                }
            }
            requestAnimationFrame(drawLoop);
        }

        function stopPlayback() { isPlaying = false; cancelAnimationFrame(timerID); for(let i=0; i<STEPS; i++) instruments.forEach(inst => domCells[inst][i].classList.remove('playing-col')); }

        document.getElementById('btn-mode-basic').addEventListener('click', () => {
            currentMode = 'basic'; document.getElementById('btn-mode-basic').classList.add('mode-active'); document.getElementById('btn-mode-glitch').classList.remove('mode-active');
            updateCurrentPatternFromStorage();
        });
        document.getElementById('btn-mode-glitch').addEventListener('click', () => {
            currentMode = 'glitch'; document.getElementById('btn-mode-glitch').classList.add('mode-active'); document.getElementById('btn-mode-basic').classList.remove('mode-active');
            updateCurrentPatternFromStorage();
        });
        document.getElementById('btn-generate').addEventListener('click', generateData);
        document.getElementById('btn-pdf').addEventListener('click', exportPDF);
        document.getElementById('btn-play').addEventListener('click', () => { 
            initAudio(); if(audioCtx.state === 'suspended') audioCtx.resume();
            if(!isPlaying) { isPlaying = true; currentStep = 0; nextNoteTime = audioCtx.currentTime + 0.05; drawQueue = []; scheduler(); drawLoop(); }
        });
        document.getElementById('btn-stop').addEventListener('click', stopPlayback);
        const loopBtn = document.getElementById('btn-loop');
        loopBtn.addEventListener('click', () => { isLooping = !isLooping; loopBtn.innerText = isLooping ? "Loop: ON" : "Loop: OFF"; loopBtn.classList.toggle('btn-toggle-active'); });
        document.getElementById('bpm-slider').addEventListener('input', (e) => { bpm = parseInt(e.target.value); document.getElementById('bpm-display').innerText = bpm; });

        initGrid(); generateData();
    </script>
</body>
</html>
